<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link
            rel="shortcut icon"
            href="favicon.ico"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />
        <meta
            name="theme-color"
            content="#000000"
        />
        <link
            rel="manifest"
            href="manifest.json"
        />
        <script type="text/javascript" src="_socket/info.js"></script>
        <script>
            var script = document.createElement('script');
            window.registerSocketOnLoad = function (cb) {
                window.socketLoadedHandler = cb;
            };
            const parts = (window.location.search || '').replace(/^\?/, '').split('&');
            const query = {};
            parts.forEach(item => {
                const [name, val] = item.split('=');
                query[decodeURIComponent(name)] = val !== undefined ? decodeURIComponent(val) : true;
            });
            script.onload = function () {
                typeof window.socketLoadedHandler === 'function' && window.socketLoadedHandler();
            };
            // Set background immediately to avoid white flash in dark mode (or vice versa)
            var t = query.theme || window.localStorage.getItem('App.themeName');
            if (t === 'dark') {
                document.documentElement.style.background = '#121212';
            } else if (t === 'light') {
                document.documentElement.style.background = '#ffffff';
            }

            script.src =
                window.location.port === '3000'
                    ? `${window.location.protocol}//${query.host || window.location.hostname}:${query.port || 8081}/lib/js/socket.io.js`
                    : '../../lib/js/socket.io.js';

            document.head.appendChild(script);
        </script>
        <title>Devices</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script
            type="module"
            src="src/index.tsx"
        ></script>
    </body>
</html>
